  apiVersion: automation.cloudbees.io/v1alpha1                                                                                                       
  kind: workflow                                                                                                                                     
  name: deployer                                                                                                                                     
                                                                                                                                                     
  on:                                                                                                                                                
    workflow_call:                                                                                                                                   
      inputs:                                                                                                                                        
        environment:                                                                                                                                 
          type: string                                                                                                                               
          required: true                                                                                                                             
        manifest:                                                                                                                                    
          type: string                                                                                                                               
          required: true                                                                                                                             
                                                                                                                                                     
  jobs:                                                                                                                                              
    deploy-frontend:                                                                                                                                 
      if: ${{ fromJSON(inputs.manifest)['ecommerce-app']['dnarlakanti/ecommerce-frontend'].deploy }}                                                 
      uses: dnarlakanti-IN-297/ecommerce-app/.cloudbees/workflows/frontend-deploy.yaml                                                               
      with:                                                                                                                                          
        artifact-id: ${{ fromJSON(inputs.manifest)['ecommerce-app']['dnarlakanti/ecommerce-frontend'].id }}                                          
        environment: ${{ inputs.environment }}                                                                                                       
                                                                                                                                                     
    deploy-backend:                                                                                                                                  
      if: ${{ fromJSON(inputs.manifest)['ecommerce-app']['dnarlakanti/ecommerce-backend'].deploy }}                                                  
      uses: dnarlakanti-IN-297/ecommerce-app/.cloudbees/workflows/backend-deploy.yaml                                                                
      with:                                                                                                                                          
        artifact-id: ${{ fromJSON(inputs.manifest)['ecommerce-app']['dnarlakanti/ecommerce-backend'].id }}                                           
        environment: ${{ inputs.environment }}                                                                                                       
                                                                                                                                                     
    deploy-database:                                                                                                                                 
      if: ${{ fromJSON(inputs.manifest)['ecommerce-app']['database'].deploy }}                                                                       
      uses: dnarlakanti-IN-297/ecommerce-app/.cloudbees/workflows/database-deploy.yaml                                                               
      with:                                                                                                                                          
        artifact-id: ${{ fromJSON(inputs.manifest)['ecommerce-app']['database'].id }}                                                                
        environment: ${{ inputs.environment }}