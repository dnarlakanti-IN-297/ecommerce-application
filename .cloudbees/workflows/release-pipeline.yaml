apiVersion: automation.cloudbees.io/v1alpha1
kind: workflow
name: release-pipeline
on:
  workflow_dispatch:
    inputs:
      manifest:
        type: string
        required: true
        description: This is a system-generated parameter and is required for use in application releases. Refer to https://docs.cloudbees.com/docs/cloudbees-platform/latest/applications/releases#manifest for the expected format
      kubeconfig:
        type: string
        required: true
        description: Kubernetes config for cluster access
metadata:
  stages/v1alpha1:
    - name: Deploy to Dev
      jobs:
        - dev
    - name: Deploy to Staging
      jobs:
        - staging
    - name: Deploy to Prod
      jobs:
        - production
jobs:
  staging:
    needs: dev
    environment: staging
    uses: ./.cloudbees/workflows/deployer.yaml
    with:
      manifest: ${{ inputs.manifest }}
      environment: ${{ job.environment }}
      kubeconfig: ${{ inputs.kubeconfig }}
  production:
    needs: staging
    environment: production
    uses: ./.cloudbees/workflows/deployer.yaml
    with:
      manifest: ${{ inputs.manifest }}
      environment: ${{ job.environment }}
      kubeconfig: ${{ inputs.kubeconfig }}
  dev:
    environment: dev
    uses: ./.cloudbees/workflows/deployer.yaml
    with:
      manifest: ${{ inputs.manifest }}
      environment: ${{ job.environment }}
      kubeconfig: ${{ inputs.kubeconfig }}
    secrets: inherit
    vars: inherit
